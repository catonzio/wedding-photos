<!-- ── Snackbar ─────────────────────────────────────────────────────── -->
<template x-teleport="body">
    <div x-show="snackbar" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-2"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-5 py-3 rounded-full bg-text text-white font-sans text-sm shadow-lg whitespace-nowrap"
        style="display:none;" x-text="snackbarMsg"></div>
</template>
