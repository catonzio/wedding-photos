<!-- ── Upload dialog ────────────────────────────────────────────────── -->
<template x-teleport="body">
    <div x-show="dialogOpen" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" class="fixed inset-0 z-40 bg-black/60 flex items-center justify-center"
        style="display: none;">
        <div class="w-full max-w-[440px] bg-surface rounded-2xl shadow-xl p-6 pb-safe mx-4" @click.stop>

            <!-- Dialog header -->
            <div class="flex items-center justify-between mb-5">
                <h3 class="font-serif italic text-xl text-text">Carica una foto</h3>
                <button @click="tryCloseDialog()" class="text-muted hover:text-text">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Step 1: Identity -->
            <div x-show="dialogStep === 'identity'">
                <p class="font-sans text-sm text-muted mb-4">Inserisci il tuo nome per continuare.</p>
                <div class="space-y-3">
                    <input x-model="guestName" type="text" placeholder="Nome" autocomplete="given-name"
                        class="w-full border border-border rounded-lg px-4 py-3 font-sans text-sm text-text bg-bg focus:outline-none focus:ring-2 focus:ring-gold/40" />
                    <input x-model="guestSurname" type="text" placeholder="Cognome" autocomplete="family-name"
                        class="w-full border border-border rounded-lg px-4 py-3 font-sans text-sm text-text bg-bg focus:outline-none focus:ring-2 focus:ring-gold/40" />
                </div>
                <p x-show="identityError" x-text="identityError" class="mt-2 text-sm text-red-600 font-sans"></p>
                <button @click="validateIdentity()" :disabled="identityLoading"
                    class="mt-5 w-full py-3 rounded-full bg-gold text-white font-sans text-sm font-medium disabled:opacity-60 active:scale-[0.98] transition-transform">
                    <span x-show="!identityLoading">Continua</span>
                    <span x-show="identityLoading">Verifica in corso…</span>
                </button>
            </div>

            <!-- Step 2: File picker -->
            <div x-show="dialogStep === 'file'">
                <p class="font-sans text-sm text-muted mb-4">
                    Seleziona le foto o i video da caricare (max 50 MB ciascuno).
                </p>
                <label
                    class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-border rounded-xl cursor-pointer hover:border-gold/60 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-8 h-8 text-muted mb-2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                    <span class="font-sans text-sm text-muted">Tocca per scegliere i file</span>
                    <input type="file" multiple accept="image/*,video/*" class="hidden"
                        @change="onFilesSelected($event)" />
                </label>

                <!-- Selected files summary -->
                <div x-show="selectedFiles.length > 0"
                    class="mt-3 flex items-center justify-between font-sans text-sm text-text">
                    <span x-text="selectedFiles.length + ' file selezionati'"></span>
                    <span class="text-muted"
                        x-text="formatSize(selectedFiles.reduce((s, f) => s + f.size, 0))"></span>
                </div>

                <p x-show="fileError" x-text="fileError" class="mt-2 text-sm text-red-600 font-sans"></p>

                <button @click="startUpload()" :disabled="selectedFiles.length === 0 || uploading"
                    class="mt-5 w-full py-3 rounded-full bg-gold text-white font-sans text-sm font-medium disabled:opacity-60 active:scale-[0.98] transition-transform">
                    Carica
                </button>
            </div>

            <!-- Step 3: Uploading -->
            <div x-show="dialogStep === 'uploading'" class="py-6">
                <div class="flex justify-between font-sans text-sm text-muted mb-3">
                    <span x-text="`Caricamento ${uploadDone} di ${uploadTotal}…`"></span>
                    <span x-text="totalPercent + '%'"></span>
                </div>
                <div class="w-full h-2 bg-border rounded-full overflow-hidden">
                    <div class="h-full bg-gold rounded-full transition-all duration-200"
                        :style="'width:' + totalPercent + '%'"></div>
                </div>
            </div>

            <!-- Step 4: Done -->
            <div x-show="dialogStep === 'done'" class="text-center py-6">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-12 h-12 text-gold mx-auto mb-3">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="font-serif italic text-xl text-text">Grazie!</p>
                <p class="font-sans text-sm text-muted mt-1">Le tue foto sono state caricate con successo.</p>
                <button @click="closeDialog()"
                    class="mt-5 px-6 py-2.5 rounded-full border border-border font-sans text-sm text-text active:scale-[0.97] transition-transform">Chiudi</button>
            </div>

        </div>
    </div><!-- /upload dialog -->
</template>
