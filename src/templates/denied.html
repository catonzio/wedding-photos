<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F8F7F2" />
    <title>Il Nostro Matrimonio</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Jost:wght@300;400&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#F8F7F2',
                        text: '#2D2C28',
                        muted: '#7C7B72',
                        gold: '#B8972E',
                        sage: '#7A9069',
                        border: '#E2E0D6',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
                        sans: ['Jost', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.6s ease forwards;
        }

        .delay-1 {
            animation-delay: 0.15s;
            opacity: 0;
        }

        .delay-2 {
            animation-delay: 0.3s;
            opacity: 0;
        }

        /* Thin gold rule */
        .gold-rule {
            width: 40px;
            height: 1px;
            background: #B8972E;
            margin: 0 auto;
        }
    </style>
</head>

<body class="min-h-screen bg-bg flex items-center justify-center px-6">

    <div class="text-center max-w-xs w-full">

        <!-- Botanical illustration -->
        <div class="fade-up mb-8 flex justify-center">
            <svg width="64" height="80" viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg"
                class="text-sage opacity-60">
                <!-- Stem -->
                <line x1="32" y1="78" x2="32" y2="30" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                <!-- Left leaf -->
                <path d="M32 55 C32 55 16 50 14 38 C22 36 32 45 32 55Z" stroke="currentColor" stroke-width="1.2"
                    fill="none" stroke-linejoin="round" />
                <!-- Right leaf -->
                <path d="M32 45 C32 45 48 40 50 28 C42 26 32 35 32 45Z" stroke="currentColor" stroke-width="1.2"
                    fill="none" stroke-linejoin="round" />
                <!-- Top bud -->
                <ellipse cx="32" cy="22" rx="6" ry="10" stroke="currentColor" stroke-width="1.2" fill="none" />
                <!-- Bud tip -->
                <path d="M32 12 C32 12 28 8 32 4 C36 8 32 12 32 12Z" stroke="currentColor" stroke-width="1.2"
                    fill="none" stroke-linejoin="round" />
            </svg>
        </div>

        <!-- Gold rule -->
        <div class="gold-rule fade-up delay-1 mb-6"></div>

        <!-- Message -->
        <p class="fade-up delay-1 font-serif italic font-light text-2xl text-text leading-snug mb-3">
            Questa pagina è riservata<br />agli invitati
        </p>

        <p class="fade-up delay-2 font-sans font-light text-sm text-muted leading-relaxed">
            Scansiona il codice QR sul tuo tavolo<br />per accedere alle foto.
        </p>

        <!-- Gold rule -->
        <div class="gold-rule fade-up delay-2 mt-6"></div>

    </div>

</body>

</html>
